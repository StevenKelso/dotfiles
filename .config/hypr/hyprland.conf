#-------------------------------------------------------------
# autostart
#-------------------------------------------------------------

exec-once = waybar
exec-once = hyprpaper
exec-once = hyprsunset
exec-once = hypridle
exec-once = udiskie


#-------------------------------------------------------------
# variables
#-------------------------------------------------------------

$mainMod = SUPER
$terminal = kitty
$browser = firefox


#-------------------------------------------------------------
# env variables
#-------------------------------------------------------------

env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that


#-------------------------------------------------------------
# keybinds
#-------------------------------------------------------------

# launch terminal
bind = $mainMod, RETURN, exec, $terminal

# rofi
bind = $mainMod, R, exec, ~/.config/rofi/scripts/launcher.sh
bind = $mainMod, p, exec, ~/.config/rofi/scripts/powermenu.sh
bind = $mainMod, w, exec, ~/.config/rofi/scripts/wifi.sh
bind = $mainMod, TAB, exec, ~/.config/rofi/scripts/window.sh

# launch web browser
bind = $mainMod, B, exec, $browser

# unmount via udiskie
bind = $mainMod SHIFT, U, exec, udiskie-umount -a

# screenshot
bind = $mainMod, T, exec, hyprshot -m output -m active

# regional screenshot
bind = $mainMod SHIFT, T, exec, hyprshot -m region --raw | satty --filename -

# controls
bind = $mainMod, ESCAPE, exec, hyprlock
bind = $mainMod SHIFT, ESCAPE, exit
bind = SHIFT CTRL, RETURN, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspacesilent, special:magic
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, C, killactive
bind = $mainMod, V, togglefloating
bind = $mainMod, F, fullscreen, 1 # toggle maximize active window

# move focus
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

# move active window
bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, J, movewindow, d
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, L, movewindow, r

# switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# move active window to new workspace
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5

# output volume
binde = , XF86AudioLowerVolume, exec, ~/.config/scripts/volume_down.sh
binde = , XF86AudioRaiseVolume, exec, ~/.config/scripts/volume_up.sh
bind = , XF86AudioMute, exec, ~/.config/scripts/volume_mute.sh

# input volume
bind = , XF86AudioMicMute, exec, ~/.config/scripts/mic_volume_mute.sh
binde = $mainMod, F11, exec, ~/.config/scripts/mic_volume_down.sh
binde = $mainMod, F12, exec, ~/.config/scripts/mic_volume_up.sh

# brightness
binde = , XF86MonBrightnessUp, exec, ~/.config/scripts/brightness_up.sh
binde = , XF86MonBrightnessDown, exec, ~/.config/scripts/brightness_down.sh


#-------------------------------------------------------------
# appearance
#-------------------------------------------------------------

# window layouts
master {
    mfact = 0.5
}

# general
general {
    gaps_in = 8
    gaps_out = 16
    border_size = 3
    col.active_border = rgb(d8a657)
    col.inactive_border = rgb(a89984)
    allow_tearing = false
    layout = master
}

# decoration
decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 1.0
    shadow {
        enabled = false
    }
    blur {
        enabled = false
    }
}

# animations
animations {
    enabled = true
        bezier = wind, 0.05, 0.85, 0.03, 0.97
        bezier = winIn, 0.07, 0.88, 0.04, 0.99
        bezier = winOut, 0.20, -0.15, 0, 1
        bezier = liner, 1, 1, 1, 1
        bezier = md3_standard, 0.12, 0, 0, 1
        bezier = md3_decel, 0.05, 0.80, 0.10, 0.97
        bezier = md3_accel, 0.20, 0, 0.80, 0.08
        bezier = overshot, 0.05, 0.85, 0.07, 1.04
        bezier = crazyshot, 0.1, 1.22, 0.68, 0.98
        bezier = hyprnostretch, 0.05, 0.82, 0.03, 0.94
        bezier = menu_decel, 0.05, 0.82, 0, 1
        bezier = menu_accel, 0.20, 0, 0.82, 0.10
        bezier = easeInOutCirc, 0.75, 0, 0.15, 1
        bezier = easeOutCirc, 0, 0.48, 0.38, 1
        bezier = easeOutExpo, 0.10, 0.94, 0.23, 0.98
        bezier = softAcDecel, 0.20, 0.20, 0.15, 1
        bezier = md2, 0.30, 0, 0.15, 1
        bezier = OutBack, 0.28, 1.40, 0.58, 1
        bezier = easeInOutCirc, 0.78, 0, 0.15, 1
        animation = border, 1, 1.0, liner
        animation = borderangle, 1, 82, liner, loop
        animation = windowsIn, 1, 1.2, winIn, slide
        animation = windowsOut, 1, 1.2, easeOutCirc
        animation = windowsMove, 1, 1.2, wind, slide
        animation = fade, 1, 1.0, md3_decel
        animation = layersIn, 1, 1.0, menu_decel, slide
        animation = layersOut, 1, 1.0, menu_accel
        animation = fadeLayersIn, 1, 1.0, menu_decel
        animation = fadeLayersOut, 1, 1.0, menu_accel
        animation = workspaces, 1, 1.2, menu_decel, slide
        animation = specialWorkspace, 1, 1.2, md3_decel, slidefadevert 15%
}


#-------------------------------------------------------------
# behavior
#-------------------------------------------------------------

# window rules
windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}


# input
input {
    kb_layout = us
    kb_variant = ,qwerty
    kb_options = 
    follow_mouse = 1
    touchpad {
        natural_scroll = no
    }
    sensitivity = 0 # -1.0 to 1.0, 0 means no modification.
}

# device
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# misc
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# ecosystem
ecosystem {
    no_update_news = true
    no_donation_nag = true
}

#-------------------------------------------------------------
# monitor
#-------------------------------------------------------------

monitor = , highrr, auto, 1
