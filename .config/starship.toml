format = """
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$fill\
$jobs\
$line_break\
$character\
"""

add_newline = true

[fill]
symbol = ""

[directory]
style = "blue"
read_only = " ´Çú"
truncation_length = 4
truncate_to_repo = true

[character]
success_symbol = "[¾░£┤](bold yellow)"
error_symbol = "[¾░£┤](bold red)"
vicmd_symbol = "[¾░£┤](bold green)"

[git_branch]
symbol = "´Éÿ "
format = 'on [$symbol$branch(:$remote_branch)]($style) '
ignore_branches=[]
style = "bold purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "cyan"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[git_metrics]
disabled = false

[jobs]
symbol = "´Çô"
style = "bold red"
number_threshold = 1
format = "[$symbol]($style)"

[memory_usage]
symbol = "´íÜ "

[python]
symbol="¾░îá"

[c]
symbol="¯ÿ×"

[lua]
symbol="¾░ó▒"

[rust]
symbol = "¯×¿"

[time]
disabled = false
style = "bold yellow"
format = "[$time]($style)"

[custom.stunnel]
when = "ps aux | grep stunnel | grep -v grep"
command = "ps -o etime= -p $(ps aux | grep stunnel | grep -v grep | awk '{print $2}')"
style = "red"
format = "[TUNNEL OPEN for $output]($style)"
